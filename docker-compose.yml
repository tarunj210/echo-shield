services:
  postgres:
    image: postgres:16
    container_name: echoshield-postgres
    environment:
      POSTGRES_DB: echoshield
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
      
    volumes:
      - echoshield_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  neo4j:
    image: neo4j:5
    container_name: echoshield-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - echoshield_neo4j_data:/data

volumes:
  echoshield_postgres_data:
  echoshield_neo4j_data: